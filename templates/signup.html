<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<div style="display: flex; flex-direction: column; gap: 110px; align-items: center;">
<div class="container" style="max-width: 400px;">
    <h2>Sign Up</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Choose Username" required>
        <input type="password" name="password" placeholder="Choose Password" required>
        <button type="submit" class="btn-add">Sign Up</button>
    </form>
    <p>Already have an account? <a href="/login">Login</a></p>
</div>
<div>
<img src="{{ url_for('static', filename='capy_login.png') }}" alt="Capybara" height="600" class="centercapy">
</div>
